name: Deploy Fast-Tracker PWA to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'packages/fast-tracker/**'
      - '.github/workflows/fast-tracker-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_WORKSPACES: 'false'
      NPM_CONFIG_USERCONFIG: /dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/fast-tracker/package.json

      - name: Ensure modern npm
        run: npm install -g npm@10

      - name: Versions
        run: |
          node --version
          npm --version
          npm config get workspaces || true
          npm config list -l | grep -E "workspaces|userconfig" || true

      - name: Install dependencies
        working-directory: packages/fast-tracker
        run: npm install --no-workspaces

      - name: Build
        working-directory: packages/fast-tracker
        run: npm run build

      - name: Verify dist output
        run: |
          ls -la packages/fast-tracker
          ls -la packages/fast-tracker/dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/fast-tracker/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
