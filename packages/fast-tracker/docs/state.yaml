# Core Functionality
core_functionality:
  time_display:
    format: "12-hour AM/PM"
    timezone: "America/Chicago (default)"
    update_interval: "1 second"
  
  entry_management:
    storage: "localStorage"
    storage_key: "time-tracker-saved-entries"
    fields:
      - name: "id"
        type: "string"
        generation: "timestamp + random string"
      - name: "time"
        type: "timestamp (number)"
        editable: true
      - name: "note"
        type: "string"
        editable: true
  
  user_interactions:
    - action: "Click on time entry"
      result: "Shows alert with elapsed time in hours, minutes, seconds"
    - action: "Click Edit button"
      result: "Opens in-place editing form for time and note"
    - action: "Click Delete button"
      result: "Removes entry from storage and display"

# UI Components
ui_components:
  - name: "Current Time Display"
    id: "current-time"
    updates: "Every second"
  
  - name: "Timezone Selector"
    id: "time-entry-timezone"
    default: "America/Chicago"
    
  - name: "Time Input"
    id: "time-entry-datetime"
    type: "datetime-local"
    default: "Current time"
    
  - name: "Note Input"
    id: "time-entry-note"
    type: "textarea"
    
  - name: "Save Button"
    id: "save-with-note-btn"
    action: "Saves new entry"
    
  - name: "Saved Entries Container"
    id: "saved-entries"
    content: "Dynamically generated entry cards"

